version: "3.9"
services:
  mysql:
    image: mysql:8.0.43
    container_name: schedule_mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: schedule_db
    ports:
      - "3306:3306"
    command: >
      --character-set-server=utf8mb4
      --collation-server=utf8mb4_unicode_ci
    volumes:
      - mysql_data:/var/lib/mysql

volumes:
  mysql_data:
